<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0D0D0D"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="rgba(255,255,255,0.03)" strokeWidth="1"/>
    </pattern>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,30,30,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,30,30,0.02)"/>
    </linearGradient>
  </defs>
  <rect x="100" y="150" width="600" height="300" rx="20" fill="url(#g)"/>
  <ellipse cx="400" cy="300" rx="200" ry="80" fill="none" stroke="rgba(255,30,30,0.06)" stroke-width="2"/>
  <ellipse cx="400" cy="300" rx="180" ry="70" fill="none" stroke="rgba(255,30,30,0.04)" stroke-width="1" stroke-dasharray="4 6"/>
  <circle cx="400" cy="300" r="4" fill="rgba(255,30,30,0.2)"/>
  <text x="400" y="240" text-anchor="middle" fill="rgba(255,255,255,0.08)" font-family="Rajdhani,sans-serif" font-size="14" font-weight="bold" letter-spacing="4">KR FUNVERSE</text>
  <text x="400" y="370" text-anchor="middle" fill="rgba(255,255,255,0.05)" font-family="Rajdhani,sans-serif" font-size="10" letter-spacing="2">IMAGE PLACEHOLDER</text>
  <line x1="200" y1="300" x2="600" y2="300" stroke="rgba(255,30,30,0.03)" stroke-width="1"/>
  <rect x="100" y="150" width="600" height="300" rx="20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
</svg>
